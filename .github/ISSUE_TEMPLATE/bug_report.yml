name: Bug report
description: Report a problem with the Cudy Router integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem.

        Please attach Home Assistant diagnostics for the Cudy Router integration. Diagnostics usually contain the router page shapes needed to fix model-specific issues.

        Download diagnostics from Home Assistant:

        1. In Home Assistant, go to **Settings > Devices & services**.
        2. Open the **Cudy Router** integration.
        3. Use the three-dot menu on the affected Cudy Router entry.
        4. Choose **Download diagnostics**.
        5. Drag and drop the downloaded diagnostics file into this issue.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem.
      placeholder: VPN clients sensor shows 0 while the router UI shows 1
    validations:
      required: true

  - type: input
    id: integration-version
    attributes:
      label: Integration version
      description: The Cudy Router version shown in HACS or Home Assistant.
      placeholder: "1.3.18"
    validations:
      required: true

  - type: input
    id: home-assistant-version
    attributes:
      label: Home Assistant version
      description: The Home Assistant Core version from Settings > About.
      placeholder: "2026.4.4"
    validations:
      required: true

  - type: input
    id: router-model
    attributes:
      label: Router model and firmware
      description: Include the router model, hardware revision, and firmware version if known.
      placeholder: "P5 V1.1, firmware 2.4.25"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect the integration to show or do?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps, settings, or page where the problem appears.
      placeholder: |
        1. Open Settings > Devices & services > Cudy Router
        2. Check the VPN clients sensor
        3. Compare it with the router web UI
    validations:
      required: true

  - type: checkboxes
    id: diagnostics-confirmation
    attributes:
      label: Diagnostics
      description: In Home Assistant, go to Settings > Devices & services > Cudy Router, open the three-dot menu on the affected entry, choose Download diagnostics, then drag and drop the diagnostics file into this issue before submitting.
      options:
        - label: I have attached the Home Assistant diagnostics file, or I have explained below why I cannot provide it.
          required: true

  - type: textarea
    id: diagnostics-explanation
    attributes:
      label: Diagnostics attachment or explanation
      description: Attach the diagnostics file to the issue. If diagnostics are unavailable, explain why here.
      placeholder: Drag and drop the diagnostics file here, or explain why it is unavailable.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, related logs, or anything else that may help.
