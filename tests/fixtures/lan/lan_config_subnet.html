<form class="form-horizontal" role="form">
  <div class="form-group" id="cbi-network-lan-ipaddr">
    <label for="cbid.network.lan.ipaddr">IP Address</label>
    <input
      type="text"
      name="cbid.network.lan.ipaddr"
      id="cbid.network.lan.ipaddr"
      value="192.168.10.1"
    />
  </div>

  <div class="form-group" id="cbi-network-lan-netmask">
    <label for="cbid.network.lan.netmask">Subnet Mask</label>
    <div>
      <input
        type="text"
        name="cbid.network.lan.netmask"
        id="cbid.network.lan.netmask"
        value="255.255.255.0"
        disabled="disabled"
        style="display: none;"
      />
    </div>
    <div>
      <select name="cbid.network.lan.netmask" id="cbid.network.lan.netmask.select">
        <option value="255.255.255.0" selected="selected">255.255.255.0</option>
        <option value="255.255.0.0">255.255.0.0</option>
        <option value="">-- custom --</option>
      </select>
    </div>
  </div>
</form>
