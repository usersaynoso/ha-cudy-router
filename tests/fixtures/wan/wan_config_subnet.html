<form class="form-horizontal" role="form">
  <div class="form-group" id="cbi-network-wan-proto">
    <label for="cbid.network.wan.proto">Protocol</label>
    <select name="cbid.network.wan.proto" id="cbid.network.wan.proto">
      <option value="dhcp" selected="selected">DHCP</option>
      <option value="pppoe">PPPoE</option>
      <option value="static">Static(Fixed IP)</option>
    </select>
  </div>

  <div class="form-group" id="cbi-network-wan-netmask">
    <label for="cbid.network.wan.netmask">Subnet Mask</label>
    <div>
      <input
        type="text"
        name="cbid.network.wan.netmask"
        id="cbid.network.wan.netmask"
        value="255.255.255.0"
        disabled="disabled"
        style="display: none;"
      />
    </div>
    <div>
      <select name="cbid.network.wan.netmask" id="cbid.network.wan.netmask.select">
        <option value="255.255.255.0" selected="selected">255.255.255.0</option>
        <option value="255.255.0.0">255.255.0.0</option>
        <option value="">-- custom --</option>
      </select>
    </div>
  </div>
</form>
